version: '3.8'

services:
  water-app:
    image: naderganayem/water
    container_name: water-app
    restart: unless-stopped
    networks:
      - water-network

  # Served at https://yasmin.ganayem.com/הפרעה_או_בעיה/ (path prefix stripped for the container)
  site1:
    image: nginx:alpine
    container_name: site1-web
    restart: unless-stopped
    volumes:
      - ./site1/html:/usr/share/nginx/html:ro
    networks:
      - water-network

  nginx:
    image: nginx:alpine
    container_name: water-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - water-app
      - site1
    networks:
      - water-network
    # Periodic reload picks up renewed certs from certbot without mounting Docker socket into certbot
    command: "/bin/sh -c 'while :; do sleep 1h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: water-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --preferred-challenges http-01 --quiet; sleep 12h & wait $${!}; done;'"

networks:
  water-network:
    driver: bridge
    