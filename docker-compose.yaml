services:
  water-app:
    image: naderganayem/water
    container_name: water-app
    restart: unless-stopped
    networks:
      - water-network

  # Path-based SPAs: one nginx serves all; add a volume per site + match in nginx/static-sites.conf + edge nginx.conf
  static-sites:
    image: nginx:alpine
    container_name: static-sites
    restart: unless-stopped
    volumes:
      - ./nginx/static-sites.conf:/etc/nginx/conf.d/default.conf:ro
      - ./sites/הפרעה_או_בעיה:/var/www/הפרעה_או_בעיה:ro
      - ./sites/linux_devops_01:/var/www/linux_devops_01:ro
    networks:
      - water-network

  nginx:
    image: nginx:alpine
    container_name: water-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - water-app
      - static-sites
    networks:
      - water-network
    # Periodic reload picks up renewed certs from certbot without mounting Docker socket into certbot
    command: "/bin/sh -c 'while :; do sleep 1h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: water-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --preferred-challenges http-01 --quiet; sleep 12h & wait $${!}; done;'"

networks:
  water-network:
    driver: bridge
    