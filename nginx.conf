user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Docker embedded DNS (needed for OCSP stapling resolver)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ACME HTTP-01 (Certbot webroot) — any single-label *.ganayem.com + apex
    server {
        listen 80;
        server_name ganayem.com *.ganayem.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # TLS: use cert with CN/SAN for *.ganayem.com (wildcard) + ganayem.com; paths match certbot --cert-name ganayem-wildcard
    server {
        listen 443 ssl;
        http2 on;
        # *.ganayem.com matches yasmin.ganayem.com, water.ganayem.com, etc. (one label only).
        # Does NOT match e.g. www.yasmin.ganayem.com — add another server_name if you need that.
        server_name ganayem.com *.ganayem.com;

        ssl_certificate /etc/letsencrypt/live/ganayem-wildcard/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ganayem-wildcard/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/ganayem-wildcard/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Static SPAs: full URI forwarded to static-sites (see nginx/static-sites.conf + sites/<path>/)

        location = /הפרעה_או_בעיה {
            return 301 /הפרעה_או_בעיה/;
        }

        location /הפרעה_או_בעיה/ {
            proxy_pass http://static-sites:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /הפרעה_או_בעיה;
        }

        location = /linux_devops_01 {
            return 301 /linux_devops_01/;
        }

        location /linux_devops_01/ {
            proxy_pass http://static-sites:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /linux_devops_01;
        }

        location / {
            proxy_pass http://water-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
