# One server: path-based SPAs. Each location must match a volume under /var/www/<segment>/html/
# Add a new site: (1) folder sites/<segment>/html/ (2) volume below (3) location block (4) edge nginx.conf

server {
    listen 80;
    charset utf-8;
    server_name _;

    location /הפרעה_או_בעיה/ {
        root /var/www;
        try_files $uri $uri/ /הפרעה_או_בעיה/html/index.html;
    }

    location /demo/ {
        root /var/www;
        try_files $uri $uri/ /demo/html/index.html;
    }
}
