# One server: path-based SPAs. Each location must match a volume under /var/www/<segment>/html/
# Add a new site: (1) folder sites/<segment>/html/ (2) volume below (3) location blocks (4) edge nginx.conf
#
# Avoid try_files $uri/ alone on the mount root — the volume is a real directory and nginx returns 403.

server {
    listen 80;
    charset utf-8;
    server_name _;

    # Exact index URL → real file (not the parent directory)
    location = /הפרעה_או_בעיה/ {
        root /var/www;
        rewrite ^ /הפרעה_או_בעיה/html/index.html break;
    }

    location /הפרעה_או_בעיה/ {
        root /var/www;
        try_files $uri @hefrega_spa;
    }

    location @hefrega_spa {
        root /var/www;
        rewrite ^ /הפרעה_או_בעיה/html/index.html break;
    }

    location = /demo/ {
        root /var/www;
        rewrite ^ /demo/html/index.html break;
    }

    location /demo/ {
        root /var/www;
        try_files $uri @demo_spa;
    }

    location @demo_spa {
        root /var/www;
        rewrite ^ /demo/html/index.html break;
    }
}
